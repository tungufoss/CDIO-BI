  <line x1="476" y1="330" x2="492" y2="330" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="498" y="311" width="148" height="38" rx="4" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="572" y="327" text-anchor="middle" dominant-baseline="middle" font-size="9.5">iCAP</text>
  <text x="572" y="341" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#666">reflection</text>

