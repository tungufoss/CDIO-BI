  <text x="402" y="22" text-anchor="middle" font-weight="700" font-size="11" fill="#555">Sprint</text>
  <text x="572" y="22" text-anchor="middle" font-weight="700" font-size="10" fill="#555">Backlog / Retrospective</text>

