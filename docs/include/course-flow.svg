  <path d="M476,115 C558,115 558,298 410,311" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M476,165 C556,165 556,300 410,311" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M476,215 C554,215 554,302 410,311" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M476,265 C552,265 552,304 410,311" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <!-- From each iREF right edge (x=646) to capstone -->
  <path d="M646,65  C662,65  662,315 476,326" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M646,115 C660,115 660,318 476,329" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M646,165 C658,165 658,320 476,332" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M646,215 C656,215 656,323 476,335" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>
  <path d="M646,265 C654,265 654,325 476,338" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-dash)"/>

  <!-- ── Capstone row (blue) ──────────────────────────── -->
  <text x="2"   y="324" dominant-baseline="middle" font-size="9" fill="#555">Wk 11–14</text>
