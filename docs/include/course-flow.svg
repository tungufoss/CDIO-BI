  <text x="232" y="76"  text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#666">readiness</text>
  <line x1="306" y1="65" x2="322" y2="65" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="328" y="46"  width="148" height="38" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
