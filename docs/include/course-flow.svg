<svg viewBox="0 0 670 375" xmlns="http://www.w3.org/2000/svg"
     font-family="Jost, system-ui, sans-serif" font-size="10.5">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#444"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Column background bands — all width=160 -->
  <!-- Col1: x=152 center=232 right=312  -->
  <!-- Col2: x=322 center=402 right=482  -->
  <!-- Col3: x=492 center=572 right=652  -->
  <rect x="152" y="30" width="160" height="264" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <rect x="322" y="30" width="160" height="264" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <rect x="492" y="30" width="160" height="264" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>

  <!-- Agile phase headers -->
